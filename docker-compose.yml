version: "3.8"

services:
  catalog-db:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data

  vehicle-catalog:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@catalog-db:5432/catalog_db
    depends_on:
      - catalog-db

volumes:
  catalog_db_data:
